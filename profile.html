<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="app.css">
</head>
<body data-nav="user" data-active="profile">
<div id="nav"></div>

<div class="profile">
    <h1 id="username">Loading...</h1>
    <p>Your uploaded tutorials</p>
</div>

<div class="grid container" id="list"></div>

<script src="app.js"></script>
<script>
function openTutorial(id){ // open page
    goWithId("tutorial_id",id,"tutorial.html")
}

function editTutorial(id){ // edit page
    goWithId("edit_tutorial_id",id,"edit_tutorial.html")
}

function deleteTutorial(id){ // delete row
    if(!confirm("Are you sure you want to delete this tutorial?")) return
    fetch("delete_own_tutorial.php",{method:"POST",body:makeData({id:id})})
        .then(function(res){return res.json()})
        .then(function(data){
            if(!data.success){
                alert(data.message||"Could not delete tutorial.")
                return
            }
            let card=byId("card_"+id)
            if(card) card.remove()
        })
}

loadJson("get_profile.php",function(data){ // profile data
    if(data.error==="not_logged_in"){
        alert("Please login first.")
        window.location="auth.html"
        return
    }

    byId("username").innerText=data.name
    if(!data.tutorials.length){
        byId("list").innerHTML="<p class='empty'>No tutorials uploaded yet.</p>"
        return
    }

    let html=""
    data.tutorials.forEach(function(item){
        html+='<div class="card" id="card_'+item.id+'"><img src="'+thumb(item.video_url)+'" onerror="this.src=\'https://via.placeholder.com/400\'"><div class="cover"><button class="small-btn" onclick="openTutorial('+item.id+')">View</button></div><h3>'+safe(item.title)+'</h3><p>'+safe(item.category)+' &bull; '+(item.like_count||0)+' likes &bull; '+(item.comment_count||0)+' comments &bull; '+(item.views||0)+' views</p><div class="action-row"><button class="tiny-btn" style="background:#333" onclick="editTutorial('+item.id+')">Edit</button><button class="tiny-btn gray-btn" onclick="deleteTutorial('+item.id+')">Delete</button></div></div>'
    })
    byId("list").innerHTML=html
},function(){
    byId("list").innerHTML="<p class='empty error'>Could not load profile. Is the server running?</p>"
})
</script>
</body>
</html>
